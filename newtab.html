<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: http:; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <title>Bavarium</title>
  <link rel="stylesheet" href="brand.css" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f0f2f5;
      --surface: #fff;
      --text: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --accent-a: #4fc3f7;
      --accent-b: #26c6a0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --tile-hover: rgba(0, 200, 83, 0.14);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131314;
        --surface: #1e1f20;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --border: #3c4043;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --tile-hover: rgba(0, 230, 118, 0.18);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .page {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 24px;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      min-height: 0;
    }
    .brand {
      justify-content: center;
      gap: 16px;
      margin: 0 0 28px;
    }
    .brand .bavarium-brand-logo {
      width: clamp(52px, 11vw, 76px);
      height: clamp(52px, 11vw, 76px);
    }
    .brand .bavarium-brand-text {
      font-family: inherit;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
    }
    .search-wrap {
      width: min(100%, 560px);
      position: relative;
      margin-bottom: 36px;
    }
    #searchInput {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
      outline: none;
    }
    #searchInput:focus {
      border-color: var(--accent-a);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.25), var(--shadow);
    }
    #suggestList {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      margin: 0;
      padding: 6px 0;
      list-style: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      max-height: 280px;
      overflow-y: auto;
      z-index: 20;
    }
    #suggestList.open { display: block; }
    #suggestList li {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
    #suggestList li:hover,
    #suggestList li.active {
      background: var(--tile-hover);
    }
    .tiles {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      width: min(100%, 640px);
    }
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 14px 8px 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      min-height: 92px;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .tile:hover {
      background: var(--tile-hover);
      border-color: var(--border);
    }
    .tile.empty {
      visibility: hidden;
      pointer-events: none;
    }
    .tile-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: contain;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px;
    }
    .tile.add .tile-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      border-style: dashed;
      background: transparent;
      color: var(--muted);
    }
    .tile-label {
      font-size: 12px;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .tile-fav-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 10px;
      opacity: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .tile.site { position: relative; }
    .tile.site.is-favorite:hover .tile-fav-badge { opacity: 1; }
    .tile-fav-badge:hover { color: var(--accent-a); background: var(--tile-hover); }
    .footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      pointer-events: none;
    }
    .footer > * { pointer-events: auto; }
    .footer-version {
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      color: var(--muted);
      max-width: min(72vw, 720px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer-github {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
    }
    .footer-github:hover { color: var(--text); }
    .footer-github img { width: 18px; height: 18px; opacity: 0.9; }
    body.has-custom-bg {
      background-color: var(--bg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    body.has-custom-bg .page {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      margin-top: 12px;
      margin-bottom: 12px;
      padding-top: 36px;
    }
    @media (prefers-color-scheme: light) {
      body.has-custom-bg .page {
        background: rgba(255, 255, 255, 0.72);
      }
    }
    #tileGrid.tiles-hidden {
      display: none !important;
    }
    .footer.footer-hidden {
      display: none !important;
    }
    #favoriteModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #favoriteModal.open { display: flex; }
    .dialog {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      width: min(100%, 400px);
      box-shadow: var(--shadow);
    }
    .dialog h2 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 600;
    }
    .dialog label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 4px;
    }
    .dialog input {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
    }
    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .dialog-actions button {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .dialog-actions button.primary {
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      border: none;
      color: #fff;
    }
    .dialog-actions button.danger {
      color: #c5221f;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand bavarium-brand">
      <img
        class="bavarium-brand-logo"
        src="build/icon.png"
        width="76"
        height="76"
        alt=""
        decoding="async"
      />
      <h1 class="bavarium-brand-text">Bavarium</h1>
    </div>
    <div class="search-wrap">
      <input
        id="searchInput"
        type="search"
        placeholder="Search or enter address"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search or enter address"
        aria-autocomplete="list"
        aria-controls="suggestList"
      />
      <ul id="suggestList" role="listbox" aria-label="Suggestions"></ul>
    </div>
    <div id="tileGrid" class="tiles" aria-label="Shortcuts"></div>
  </main>

  <footer class="footer">
    <span id="footerVersion" class="footer-version">Bavarium</span>
    <a id="footerGithub" class="footer-github" href="https://github.com/yourworstnightmare1/bavarium-browser" rel="noopener noreferrer">
      <img id="footerGithubIcon" src="assets/menu-icons/github.png" width="18" height="18" alt="" />
      <span>GitHub</span>
    </a>
  </footer>

  <div id="favoriteModal" role="dialog" aria-modal="true" aria-labelledby="favoriteModalTitle">
    <div class="dialog">
      <h2 id="favoriteModalTitle">Add favorite</h2>
      <label for="favoriteTitle">Name</label>
      <input id="favoriteTitle" type="text" placeholder="Site name" autocomplete="off" />
      <label for="favoriteUrl">URL</label>
      <input id="favoriteUrl" type="text" placeholder="https://example.com" autocomplete="off" />
      <div class="dialog-actions">
        <button type="button" class="danger" id="favoriteRemove" style="display:none;">Remove</button>
        <button type="button" id="favoriteCancel">Cancel</button>
        <button type="button" class="primary" id="favoriteSave">Save</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
