<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light dark" />
  <title>Update available</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #202124;
      color: #e8eaed;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      min-height: 100%;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }
    .subtitle {
      margin: 0 0 12px;
      font-size: 13px;
      line-height: 1.45;
      color: #9aa0a6;
    }
    .release-details {
      flex: 1 1 auto;
      min-height: 72px;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #3c4043;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      background: #292a2d;
      color: #bdc1c6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .release-details:empty::before {
      content: "No release notes provided.";
      color: #9aa0a6;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      flex-shrink: 0;
    }
    button {
      padding: 8px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #5f6368;
      background: #3c4043;
      color: #e8eaed;
    }
    button:hover { filter: brightness(1.08); }
    button.primary {
      background: #8ab4f8;
      border-color: #8ab4f8;
      color: #202124;
    }
    button.prerelease {
      background: #e65100;
      border-color: #e65100;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1 id="headline">Update available</h1>
  <p class="subtitle" id="subtitle"></p>
  <div
    class="release-details"
    id="releaseDetails"
    role="region"
    aria-label="Release details"
    tabindex="0"
  ></div>
  <div class="actions">
    <button type="button" id="btnLater">Later</button>
    <button type="button" class="primary" id="btnDownload">Download update</button>
  </div>
  <script src="update-prompt.js"></script>
</body>
</html>
