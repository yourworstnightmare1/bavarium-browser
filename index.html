<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';" />
  <title>Bavarium Browser</title>
  <link rel="stylesheet" href="brand.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      background: #131314;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #tabs {
      display: flex;
      background: #222;
      color: white;
      padding: 5px;
      position: relative;
      z-index: 4;
      flex-shrink: 0;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      margin-right: 5px;
      background: #444;
      cursor: pointer;
      user-select: none;
    }
    .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      object-fit: contain;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .tab.tab-dragging {
      opacity: 0.85;
    }

    .tab .tab-close {
      user-select: none;
    }

    .tab.active {
      background: #666;
    }
    .tab.incognito {
      border-bottom: 2px solid #5c6bc0;
    }
    .tab.incognito.active {
      background: #4a5076;
    }

    #findBar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #f5f5f7;
      border-bottom: 1px solid #c5c5c7;
      flex-wrap: wrap;
      position: relative;
      z-index: 5;
      flex-shrink: 0;
    }
    #findBar #findInput {
      flex: 1;
      min-width: 120px;
      max-width: 320px;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #aaa;
      border-radius: 6px;
    }
    #findStatus {
      font-size: 12px;
      color: #555;
      min-width: 4.5em;
    }
    #findBar .find-btn {
      padding: 4px 10px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      line-height: 1.2;
    }
    #findBar .find-btn:hover {
      background: #eee;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #ddd;
      flex-wrap: wrap;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    #urlWrap {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 200px;
      gap: 6px;
    }
    #siteInfoAnchor {
      position: relative;
      flex-shrink: 0;
    }
    #siteInfoAnchor[hidden] {
      display: none !important;
    }
    #btnSiteInfo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #5f6368;
      cursor: pointer;
    }
    #btnSiteInfo:hover {
      background: rgba(95, 99, 104, 0.12);
    }
    #btnSiteInfo:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(95, 99, 104, 0.35);
    }
    #btnSiteInfo.kind-https {
      color: #188038;
    }
    #btnSiteInfo.kind-https:hover {
      background: rgba(24, 128, 56, 0.12);
    }
    #btnSiteInfo.kind-https:focus-visible {
      box-shadow: 0 0 0 2px rgba(24, 128, 56, 0.35);
    }
    #btnSiteInfo.kind-bavarium {
      color: #5c6bc0;
    }
    #btnSiteInfo.kind-bavarium:hover {
      background: rgba(92, 107, 192, 0.14);
    }
    #btnSiteInfo.kind-bavarium:focus-visible {
      box-shadow: 0 0 0 2px rgba(92, 107, 192, 0.4);
    }
    #btnSiteInfo.kind-reblock {
      color: #1a73e8;
    }
    #btnSiteInfo.kind-reblock:hover {
      background: rgba(26, 115, 232, 0.12);
    }
    #btnSiteInfo.kind-reblock:focus-visible {
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.35);
    }
    #btnSiteInfo.kind-insecure {
      color: #d93025;
    }
    #btnSiteInfo.kind-insecure:hover {
      background: rgba(217, 48, 37, 0.12);
    }
    #btnSiteInfo.kind-insecure:focus-visible {
      box-shadow: 0 0 0 2px rgba(217, 48, 37, 0.35);
    }
    #siteInfoIcon svg {
      display: block;
      width: 18px;
      height: 18px;
    }
    #siteInfoPopover {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 1100;
      width: min(340px, calc(100vw - 24px));
      padding: 12px 14px;
      background: #fff;
      color: #202124;
      border: 1px solid #dadce0;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      font-size: 13px;
      line-height: 1.45;
    }
    #siteInfoPopover.open {
      display: block;
    }
    #siteInfoPopoverContent {
      display: flex;
      flex-direction: column;
    }
    .site-info-section {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 0;
    }
    .site-info-section:first-child {
      padding-top: 0;
    }
    .site-info-section:last-child {
      padding-bottom: 0;
    }
    .site-info-section + .site-info-section {
      border-top: 1px solid #e8eaed;
    }
    .site-info-icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      margin-top: 1px;
      color: #5f6368;
    }
    .site-info-icon svg {
      display: block;
      width: 24px;
      height: 24px;
    }
    .site-info-copy {
      flex: 1;
      min-width: 0;
    }
    .site-info-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
      color: #202124;
    }
    .site-info-desc {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: #5f6368;
    }
    .site-info-section.site-info-affiliated .site-info-icon {
      color: #1a73e8;
    }
    .site-info-section.site-info-secure .site-info-icon {
      color: #188038;
    }
    .site-info-section.site-info-insecure .site-info-icon {
      color: #d93025;
    }
    .site-info-section.site-info-proxy .site-info-icon {
      color: #5f6368;
    }
    .site-info-section.site-info-internal .site-info-icon {
      color: #5c6bc0;
    }
    #url {
      flex: 1;
      min-width: 0;
      width: auto !important;
      appearance: none;
      -webkit-appearance: none;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: #f0f2f5;
      color: #202124;
    }
    #btnAddBookmark {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      padding: 0;
      margin: 0;
      border: 1px solid #dadce0;
      border-radius: 8px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-color: #e8eaed !important;
      background-image: none !important;
      box-shadow: none !important;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      font-family: inherit;
      color: #5f6368;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btnAddBookmark:hover {
      background-color: rgba(0, 200, 83, 0.14);
      color: #00796b;
      border-color: #dadce0;
    }
    #btnAddBookmark:active {
      background-color: rgba(0, 200, 83, 0.22);
    }
    #btnAddBookmark:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 200, 83, 0.35);
    }
    #zoomAnchor {
      position: relative;
      flex-shrink: 0;
    }
    #btnZoom {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: -0.02em;
      min-width: 52px;
      padding: 0 8px;
    }
    #btnZoom .zoom-toolbar-label {
      line-height: 1;
    }
    #zoomPopover {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 1100;
      width: min(280px, calc(100vw - 24px));
      background: #fff;
      color: #202124;
      border: 1px solid #dadce0;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      flex-direction: column;
      padding: 12px 14px 14px;
      gap: 12px;
    }
    #zoomPopover.open {
      display: flex;
    }
    .zoom-popover-percent {
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      line-height: 1.2;
    }
    .zoom-popover-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .zoom-popover-step {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #f8f9fa;
      color: #202124;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .zoom-popover-step:hover {
      background: #e8eaed;
    }
    .zoom-popover-step:active {
      background: #dadce0;
    }
    #zoomPopoverSlider {
      flex: 1;
      min-width: 0;
      margin: 0;
      accent-color: #1a73e8;
    }
    #zoomPopoverReset {
      width: 100%;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #f8f9fa;
      color: #202124;
      cursor: pointer;
    }
    #zoomPopoverReset:hover:not(:disabled) {
      background: #e8eaed;
    }
    #zoomPopoverReset:disabled {
      opacity: 0.45;
      cursor: default;
    }
    #downloadsAnchor {
      position: relative;
      flex-shrink: 0;
    }
    #btnDownloads {
      position: relative;
    }
    #btnDownloads.has-active::after {
      content: "";
      position: absolute;
      top: 4px;
      right: 4px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1a73e8;
      border: 1.5px solid #ddd;
    }
    #downloadsPopover {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 1100;
      width: min(360px, calc(100vw - 24px));
      max-height: min(420px, 70vh);
      background: #fff;
      color: #202124;
      border: 1px solid #dadce0;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      flex-direction: column;
      overflow: hidden;
    }
    #downloadsPopover.open {
      display: flex;
    }
    #downloadsShelfList {
      overflow-y: auto;
      flex: 1 1 auto;
      min-height: 0;
      padding: 6px 0;
    }
    .downloads-shelf-empty {
      padding: 20px 16px;
      font-size: 13px;
      color: #5f6368;
      text-align: center;
      line-height: 1.45;
    }
    .downloads-shelf-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .downloads-shelf-row:hover {
      background: rgba(0, 0, 0, 0.04);
    }
    .downloads-shelf-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
      opacity: 0.85;
    }
    .downloads-shelf-body {
      flex: 1;
      min-width: 0;
    }
    .downloads-shelf-name {
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .downloads-shelf-meta {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .downloads-shelf-progress {
      height: 3px;
      margin-top: 6px;
      background: #e8eaed;
      border-radius: 2px;
      overflow: hidden;
    }
    .downloads-shelf-progress > span {
      display: block;
      height: 100%;
      background: #1a73e8;
      border-radius: 2px;
      transition: width 0.15s ease;
    }
    #downloadsShelfFooter {
      flex-shrink: 0;
      border-top: 1px solid #e8eaed;
      padding: 8px;
    }
    #downloadsShelfOpenManager {
      width: 100%;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #1a73e8;
      cursor: pointer;
    }
    #downloadsShelfOpenManager:hover {
      background: rgba(26, 115, 232, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      #controls {
        background: #202124;
      }
      #url {
        background-color: #303134;
        color: #e8eaed;
        border-color: #5f6368;
      }
      #btnAddBookmark {
        background-color: #3c4043 !important;
        color: #e8eaed;
        border-color: #5f6368;
      }
      #btnAddBookmark:hover {
        background-color: rgba(0, 230, 118, 0.16) !important;
        color: #69f0ae;
        border-color: #5f6368;
      }
      .toolbar-icon-btn {
        color: #e8eaed;
      }
      .toolbar-icon-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      #btnDownloads.has-active::after {
        border-color: #202124;
        background: #8ab4f8;
      }
      #downloadsPopover {
        background: #292a2d;
        color: #e8eaed;
        border-color: #3c4043;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      .downloads-shelf-empty {
        color: #9aa0a6;
      }
      .downloads-shelf-row:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .downloads-shelf-meta {
        color: #9aa0a6;
      }
      .downloads-shelf-progress {
        background: #3c4043;
      }
      .downloads-shelf-progress > span {
        background: #8ab4f8;
      }
      #downloadsShelfFooter {
        border-top-color: #3c4043;
      }
      #downloadsShelfOpenManager {
        color: #8ab4f8;
      }
      #downloadsShelfOpenManager:hover {
        background: rgba(138, 180, 248, 0.12);
      }
      #zoomPopover {
        background: #292a2d;
        color: #e8eaed;
        border-color: #3c4043;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      .zoom-popover-step {
        background: #3c4043;
        color: #e8eaed;
        border-color: #5f6368;
      }
      .zoom-popover-step:hover {
        background: #48494d;
      }
      .zoom-popover-step:active {
        background: #5f6368;
      }
      #zoomPopoverSlider {
        accent-color: #8ab4f8;
      }
      #zoomPopoverReset {
        background: #3c4043;
        color: #e8eaed;
        border-color: #5f6368;
      }
      #zoomPopoverReset:hover:not(:disabled) {
        background: #48494d;
      }
      #btnSiteInfo.kind-https {
        color: #81c995;
      }
      #btnSiteInfo.kind-https:hover {
        background: rgba(129, 201, 149, 0.16);
      }
      #btnSiteInfo.kind-https:focus-visible {
        box-shadow: 0 0 0 2px rgba(129, 201, 149, 0.4);
      }
      #btnSiteInfo.kind-bavarium {
        color: #9fa8da;
      }
      #btnSiteInfo.kind-bavarium:hover {
        background: rgba(159, 168, 218, 0.16);
      }
      #btnSiteInfo.kind-reblock {
        color: #8ab4f8;
      }
      #btnSiteInfo.kind-reblock:hover {
        background: rgba(138, 180, 248, 0.14);
      }
      #btnSiteInfo.kind-insecure {
        color: #f28b82;
      }
      #btnSiteInfo.kind-insecure:hover {
        background: rgba(242, 139, 130, 0.16);
      }
      #siteInfoPopover {
        background: #292a2d;
        color: #e8eaed;
        border-color: #3c4043;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      .site-info-section + .site-info-section {
        border-top-color: #3c4043;
      }
      .site-info-title {
        color: #e8eaed;
      }
      .site-info-desc {
        color: #9aa0a6;
      }
      .site-info-section.site-info-affiliated .site-info-icon {
        color: #8ab4f8;
      }
      .site-info-section.site-info-secure .site-info-icon {
        color: #81c995;
      }
      .site-info-section.site-info-insecure .site-info-icon {
        color: #f28b82;
      }
      .site-info-section.site-info-proxy .site-info-icon {
        color: #9aa0a6;
      }
      .site-info-section.site-info-internal .site-info-icon {
        color: #9fa8da;
      }
      .downloads-toolbar-icon,
      .downloads-shelf-icon {
        filter: invert(1) brightness(1.05);
      }
      #findBar {
        background: #202124;
        border-bottom-color: #3c4043;
      }
      #findBar #findInput {
        background: #303134;
        color: #e8eaed;
        border-color: #5f6368;
      }
      #findBar #findInput::placeholder {
        color: #9aa0a6;
      }
      #findStatus {
        color: #9aa0a6;
      }
      #findBar .find-btn {
        background: #3c4043;
        color: #e8eaed;
        border-color: #5f6368;
      }
      #findBar .find-btn:hover {
        background: #48494d;
      }
    }
    #menu .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.25;
    }
    #menu .menu-item:hover {
      background: rgba(255,255,255,.08);
    }
    #menu .menu-item.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    #menu .menu-item-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      object-fit: contain;
      pointer-events: none;
      opacity: 0.92;
    }
    #menu .menu-item-icon.icon-light {
      filter: invert(1) brightness(1.05);
    }
    #menu .menu-item-label {
      flex: 1;
      min-width: 0;
    }

    .toolbar-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #3c4043;
      cursor: pointer;
    }
    .toolbar-icon-btn:hover {
      background: rgba(0, 0, 0, 0.08);
    }
    .toolbar-icon-btn:active {
      background: rgba(0, 0, 0, 0.12);
    }
    .toolbar-icon-btn svg {
      display: block;
      flex-shrink: 0;
    }

    #bookmarkbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px 6px;
      background: #292a2d;
      border-bottom: 1px solid #3c4043;
      min-height: 34px;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }
    #bookmarkbar.bookmarkbar-empty,
    #bookmarkbar.bookmarkbar-home-hidden,
    #bookmarkbar.bookmarkbar-user-hidden {
      display: none;
    }
    #devConsoleOverlay {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 100000;
      max-width: min(520px, calc(100vw - 24px));
      max-height: 40vh;
      overflow: auto;
      pointer-events: none;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
    }
    #devConsoleOverlay[hidden] {
      display: none !important;
    }
    #devConsoleOverlay .dev-console-line {
      margin: 0 0 6px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(32, 33, 36, 0.92);
      border: 1px solid #5f6368;
      color: #e8eaed;
      word-break: break-word;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }
    #devConsoleOverlay .dev-console-warn {
      border-color: #f9ab00;
      color: #fdd663;
    }
    #devConsoleOverlay .dev-console-error {
      border-color: #ea4335;
      color: #f28b82;
    }
    body.devtools-open #devConsoleOverlay {
      bottom: 48%;
    }
    #bookmarkbarItems {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      min-height: 24px;
      overflow-x: auto;
      flex-wrap: nowrap;
    }
    .bm-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      object-fit: contain;
      background: #3c4043;
    }
    .bookmark-item {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 220px;
      padding: 4px 8px;
      background: #3c4043;
      border: 1px solid #5f6368;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: #e8eaed;
    }
    .bookmark-item:hover {
      background: #48494d;
      border-color: #80868b;
    }
    .bookmark-item .bm-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bookmark-item .bm-edit {
      flex-shrink: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0 2px;
      font-size: 12px;
      color: #e8eaed;
      opacity: 0.55;
      line-height: 1;
    }
    .bookmark-item .bm-edit:hover {
      opacity: 1;
    }
    #bookmarkModal,
    #bookmarkManagerModal,
    #externalLinkModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center;
      padding: 16px;
      pointer-events: auto;
    }
    #bookmarkModal .dialog,
    #bookmarkManagerModal .dialog,
    #externalLinkModal .dialog {
      /* Match newtab favorites modal (--surface / --bg) */
      --shell-surface: #fff;
      --shell-bg: #f0f2f5;
      --shell-text: #202124;
      --shell-muted: #5f6368;
      --shell-border: #dadce0;
      --shell-accent-a: #4fc3f7;
      --shell-accent-b: #26c6a0;
      --shell-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --shell-tile-hover: rgba(0, 200, 83, 0.14);
      background: var(--shell-surface);
      color: var(--shell-text);
      border: 1px solid var(--shell-border);
      border-radius: 12px;
      padding: 20px 22px;
      width: min(100%, 400px);
      max-width: 90vw;
      box-shadow: var(--shell-shadow);
      pointer-events: auto;
    }
    #bookmarkManagerModal .dialog {
      width: min(100%, 420px);
    }
    @media (prefers-color-scheme: dark) {
      #bookmarkModal .dialog,
      #bookmarkManagerModal .dialog,
      #externalLinkModal .dialog {
        --shell-surface: #1e1f20;
        --shell-bg: #131314;
        --shell-text: #e8eaed;
        --shell-muted: #9aa0a6;
        --shell-border: #3c4043;
        --shell-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --shell-tile-hover: rgba(0, 230, 118, 0.16);
      }
    }
    /* Webviews paint above normal DOM; hide them while a shell modal is open. */
    body.shell-modal-open #views {
      background: #f0f2f5;
    }
    @media (prefers-color-scheme: dark) {
      body.shell-modal-open #views {
        background: #131314;
      }
    }
    body.shell-modal-open #views webview.tab-webview.shell-modal-suppressed,
    body.shell-modal-open #devtoolsHost.shell-modal-suppressed {
      visibility: hidden;
    }
    #bookmarkModal .dialog h2,
    #bookmarkManagerModal .dialog h2 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 600;
    }
    #externalLinkModal .external-link-lead {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--shell-text);
    }
    #externalLinkModal .external-link-url {
      margin: 0 0 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-all;
      border-radius: 8px;
      border: 1px solid var(--shell-border);
      background: var(--shell-bg);
      color: var(--shell-muted);
    }
    #externalLinkModal .external-link-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 4px;
      font-size: 13px;
      color: var(--shell-muted);
      cursor: pointer;
      user-select: none;
    }
    #externalLinkModal .external-link-remember input {
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
    }
    #bookmarkManagerList {
      max-height: 50vh;
      overflow-y: auto;
      margin: 8px 0 12px;
    }
    .bm-manager-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--shell-border);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      background: var(--shell-bg);
    }
    .bm-manager-row:hover {
      background: var(--shell-tile-hover);
    }
    .bm-manager-row .bm-mgr-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: var(--shell-text);
    }
    .bm-manager-row .bm-mgr-url {
      font-size: 11px;
      color: var(--shell-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bm-manager-empty {
      font-size: 13px;
      color: var(--shell-muted);
      padding: 12px 4px;
      line-height: 1.4;
    }
    #bookmarkAutofillHint {
      display: none;
      font-size: 12px;
      color: var(--shell-muted);
      margin: 0 0 4px;
      line-height: 1.4;
    }
    #bookmarkModal .dialog label {
      display: block;
      font-size: 12px;
      color: var(--shell-muted);
      margin: 10px 0 4px;
    }
    #bookmarkModal .dialog label:first-of-type {
      margin-top: 0;
    }
    #bookmarkModal .dialog input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--shell-border);
      border-radius: 8px;
      background: var(--shell-bg);
      color: var(--shell-text);
      pointer-events: auto;
    }
    #bookmarkModal .dialog input:focus {
      outline: none;
      border-color: var(--shell-accent-a);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.25);
    }
    #bookmarkModal .dialog input:disabled,
    #bookmarkModal .dialog input[readonly] {
      background: var(--shell-bg);
      color: var(--shell-text);
      opacity: 1;
      cursor: text;
    }
    #bookmarkModal .dialog .dialog-actions,
    #bookmarkManagerModal .dialog .dialog-actions,
    #externalLinkModal .dialog .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    #bookmarkModal .dialog button,
    #bookmarkManagerModal .dialog button,
    #externalLinkModal .dialog button {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--shell-border);
      background: var(--shell-bg);
      color: var(--shell-text);
    }
    #bookmarkModal .dialog button:hover,
    #bookmarkManagerModal .dialog button:hover,
    #externalLinkModal .dialog button:hover {
      filter: brightness(0.97);
    }
    #bookmarkModal .dialog button.primary,
    #bookmarkManagerModal .dialog button.primary {
      background: linear-gradient(135deg, var(--shell-accent-a), var(--shell-accent-b));
      border: none;
      color: #fff;
    }
    #bookmarkModal .dialog button.primary:hover,
    #bookmarkManagerModal .dialog button.primary:hover {
      filter: brightness(1.05);
    }
    #externalLinkModal .dialog button.primary {
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      border: none;
      color: #fff;
    }
    #externalLinkModal .dialog button.primary:hover {
      background: linear-gradient(135deg, #1976d2, #1565c0);
      filter: none;
    }
    #bookmarkModal .dialog button.danger {
      background: var(--shell-bg);
      color: #c5221f;
      border-color: var(--shell-border);
      margin-right: auto;
    }

    #pageColumn {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      overflow: hidden;
    }
    #views {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      z-index: 0;
      isolation: isolate;
      overflow: hidden;
      background: #131314;
    }
    #views > webview.tab-webview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #131314;
    }
    #devtoolsHost {
      display: none;
      flex: 0 0 42%;
      width: 100%;
      min-height: 160px;
      border-top: 1px solid #5f6368;
      background: #202124;
    }
    body.devtools-open #devtoolsHost {
      display: flex;
    }

    #perfOverlay {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 100001;
      width: 220px;
      padding: 8px 10px 10px;
      border-radius: 10px;
      background: rgba(32, 33, 36, 0.92);
      border: 1px solid #5f6368;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      font-size: 11px;
      color: #e8eaed;
      pointer-events: none;
      font-family: ui-monospace, monospace;
    }
    #perfOverlay[hidden] {
      display: none !important;
    }

    #startupSplash {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #131314;
      color: #e8eaed;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }
    #startupSplash[hidden] {
      display: none !important;
    }
    #startupSplash.splash-fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #startupSplash .splash-brand {
      justify-content: center;
      gap: 16px;
    }
    #startupSplash .splash-brand .bavarium-brand-logo {
      width: clamp(52px, 11vw, 76px);
      height: clamp(52px, 11vw, 76px);
    }
    #startupSplash .splash-brand .bavarium-brand-text {
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
    }
    #startupSplash .splash-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(232, 234, 237, 0.15);
      border-top-color: #69f0ae;
      border-radius: 50%;
      animation: splash-spin 0.85s linear infinite;
    }
    #startupSplash .splash-status {
      margin: 0;
      font-size: 14px;
      color: #9aa0a6;
      text-align: center;
      max-width: min(90vw, 420px);
      line-height: 1.45;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
    body.startup-loading #tabs,
    body.startup-loading #controls,
    body.startup-loading #bookmarkbar,
    body.startup-loading #findBar,
    body.startup-loading #views,
    body.startup-loading #devtoolsHost {
      visibility: hidden;
    }
    body.devtools-open #perfOverlay {
      bottom: 12px;
    }
    #perfOverlay .perf-title {
      font-size: 10px;
      color: #9aa0a6;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #perfOverlay .perf-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    #perfOverlay canvas {
      flex-shrink: 0;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.25);
    }
    #perfFpsText {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.25;
    }
    #perfFpsLabel, #perfNetLabel {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .perf-ui-fps {
      font-size: 9px;
      color: #9aa0a6;
      margin-left: 4px;
    }
    #perfFpsLabel, .perf-fps-band {
      transition: color 0.4s ease;
    }
    .perf-fps-bands {
      display: flex;
      gap: 10px;
      font-size: 10px;
    }
    #perfNetLabel {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body class="startup-loading">

<div id="startupSplash" role="status" aria-live="polite" aria-busy="true">
  <div class="splash-brand bavarium-brand">
    <img
      class="bavarium-brand-logo"
      src="build/icon.png"
      width="76"
      height="76"
      alt=""
      decoding="async"
    />
    <h1 class="bavarium-brand-text">Bavarium</h1>
  </div>
  <div class="splash-spinner" aria-hidden="true"></div>
  <p class="splash-status" id="startupSplashStatus">Starting Bavarium…</p>
</div>

<div id="tabs"></div>

<div id="settings" style="display:none; padding:10px; background:#eee;">
  <h3>Proxy Settings</h3>

  <select id="proxySelect"></select>
  <button onclick="addProxy()">Add Proxy</button>
  <button onclick="removeProxy()">Remove Selected</button>

  <br><br>

  <label>
    <input type="checkbox" id="proxyEnabled">
    Enable Proxy
  </label>
</div>

<div id="controls">
  <button type="button" class="toolbar-icon-btn" onclick="goBack()" title="Go back to the previous page" aria-label="Go back to the previous page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button type="button" class="toolbar-icon-btn" onclick="goForward()" title="Go forward to the next page" aria-label="Go forward to the next page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button type="button" class="toolbar-icon-btn" onclick="refresh()" title="Refresh — reload the current page" aria-label="Refresh — reload the current page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polyline points="23 4 23 10 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button type="button" class="toolbar-icon-btn" onclick="newTab()" title="New tab — open a blank tab (⌘T / Ctrl+T)" aria-label="New tab — open a blank tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="urlWrap">
    <div id="siteInfoAnchor" hidden>
      <button
        type="button"
        id="btnSiteInfo"
        title="Page information"
        aria-label="Page information"
        aria-haspopup="true"
        aria-expanded="false"
        aria-controls="siteInfoPopover"
      >
        <span id="siteInfoIcon" aria-hidden="true"></span>
      </button>
      <div id="siteInfoPopover" role="dialog" aria-label="Page information">
        <div id="siteInfoPopoverContent"></div>
      </div>
    </div>
    <input id="url" type="text" placeholder="Search or enter address" title="Type a URL, search terms, or bavarium:// address — Enter to go" autocomplete="off" spellcheck="true" enterkeyhint="go" aria-label="Address and search" />
    <button type="button" id="btnAddBookmark" title="Bookmark this page — save to the bar below (⌘D / Ctrl+D)" aria-label="Bookmark this page">★</button>
  </div>

  <div id="zoomAnchor">
    <button
      type="button"
      id="btnZoom"
      class="toolbar-icon-btn"
      title="Page zoom (100%)"
      aria-label="Page zoom"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="zoomPopover"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 11h6M11 8v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="zoom-toolbar-label" id="zoomToolbarLabel" aria-hidden="true">100%</span>
    </button>
    <div id="zoomPopover" role="dialog" aria-label="Page zoom">
      <div class="zoom-popover-percent" id="zoomPopoverPercent">100%</div>
      <div class="zoom-popover-row">
        <button type="button" class="zoom-popover-step" id="zoomPopoverOut" title="Zoom out" aria-label="Zoom out">−</button>
        <input type="range" id="zoomPopoverSlider" min="25" max="500" step="5" value="100" aria-label="Zoom level" />
        <button type="button" class="zoom-popover-step" id="zoomPopoverIn" title="Zoom in" aria-label="Zoom in">+</button>
      </div>
      <button type="button" id="zoomPopoverReset" disabled>Reset to 100%</button>
    </div>
  </div>

  <div id="downloadsAnchor">
    <button
      type="button"
      id="btnDownloads"
      class="toolbar-icon-btn"
      title="Downloads"
      aria-label="Downloads"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="downloadsPopover"
    >
      <img
        class="downloads-toolbar-icon"
        src="assets/menu-icons/downloads.png"
        width="20"
        height="20"
        alt=""
        aria-hidden="true"
      />
    </button>
    <div id="downloadsPopover" role="dialog" aria-label="Recent downloads">
      <div id="downloadsShelfList" role="list"></div>
      <div id="downloadsShelfFooter">
        <button type="button" id="downloadsShelfOpenManager">Download manager</button>
      </div>
    </div>
  </div>

  <button type="button" id="btnToolbarMenu" class="toolbar-icon-btn" title="Menu" aria-label="Open menu" aria-haspopup="true" aria-expanded="false" aria-controls="menu" style="position:relative; z-index:10;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
    </svg>
  </button>
</div>

<div id="findBar" aria-label="Find in page">
  <input id="findInput" type="text" placeholder="Find in page…" title="Find text on the current page (⌘F / Ctrl+F)" autocomplete="off" spellcheck="false" aria-label="Find in page" />

  <button type="button" class="find-btn" id="findPrev" title="Previous match (Shift+Enter)">‹</button>
  <button type="button" class="find-btn" id="findNext" title="Next match (Enter)">›</button>
  <button type="button" class="find-btn" id="findClose" title="Close find bar and clear highlights (Esc)">✕</button>

<div id="bookmarkbar" class="bookmarkbar-empty">
  <div id="bookmarkbarItems"></div>
</div>

<div id="bookmarkManagerModal" role="dialog" aria-modal="true" aria-labelledby="bookmarkManagerTitle">
  <div class="dialog">
    <h2 id="bookmarkManagerTitle">Bookmark manager</h2>
    <div id="bookmarkManagerList"></div>
    <div class="dialog-actions">
      <button type="button" class="primary" id="bookmarkManagerAdd">Add bookmark</button>
      <button type="button" id="bookmarkManagerClose">Close</button>

<div id="externalLinkModal" role="dialog" aria-modal="true" aria-label="Open external link">

      <input type="checkbox" id="externalLinkRemember" />

    </label>

      <button type="button" class="primary" id="externalLinkOpenBavarium">Open in Bavarium</button>

  </div>
  <div class="menu-item" role="menuitem" data-menu-action="share-page">
    <img class="menu-item-icon icon-light" src="assets/menu-icons/share-page.png" width="18" height="18" alt="" aria-hidden="true" />
    <span class="menu-item-label">Share page</span>
  </div>
  <div class="menu-item" role="menuitem" data-menu-action="developer-tools">
    <img class="menu-item-icon icon-light" src="assets/menu-icons/developer-tools.png" width="18" height="18" alt="" aria-hidden="true" />
    <span class="menu-item-label">Developer tools</span>
  </div>
  <div class="menu-item" role="menuitem" data-menu-action="github-repo">
    <img class="menu-item-icon" src="assets/menu-icons/github.png" width="18" height="18" alt="" aria-hidden="true" />
    <span class="menu-item-label">GitHub repo</span>
  </div>
</div>

<div id="pageColumn">
  <div id="views"></div>
  <webview
    id="devtoolsHost"
    partition="persist:bavarium-devtools"
    webpreferences="contextIsolation=yes,sandbox=yes"
  ></webview>
</div>

<div id="devConsoleOverlay" hidden aria-live="polite" aria-label="Developer console messages"></div>

<div id="perfOverlay" hidden aria-hidden="true">
  <div class="perf-title">Performance</div>
  <div class="perf-row">
    <canvas id="perfCanvasFps" width="72" height="28" aria-hidden="true"></canvas>
    <div id="perfFpsText">
      <span id="perfFpsLabel">Tab —</span>
      <span id="perfUiFpsLabel" class="perf-ui-fps" style="display:none;"></span>
      <span class="perf-fps-bands">
        <span class="perf-fps-band low" id="perfFpsLow" title="Average low FPS (recent window)">↓ —</span>
        <span class="perf-fps-band high" id="perfFpsHigh" title="Average high FPS (recent window)">↑ —</span>
      </span>
    </div>
  </div>
  <div class="perf-row">
    <canvas id="perfCanvasNet" width="72" height="22" aria-hidden="true"></canvas>
    <span id="perfNetLabel">↓ —  ↑ —</span>
  </div>
</div>

<script src="renderer.js"></script>

</body>
</html>
