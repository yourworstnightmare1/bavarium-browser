<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light dark" />
  <title>Quit Bavarium</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #202124;
      color: #e8eaed;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      min-height: 100%;
    }
    .message {
      margin: 0 0 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .download-hint {
      margin: 0 0 14px;
      font-size: 12px;
      line-height: 1.45;
      color: #9aa0a6;
    }
    .download-hint[hidden],
    .background-option[hidden] {
      display: none !important;
    }
    .background-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 0 0 8px;
      padding: 10px 12px;
      border: 1px solid #3c4043;
      border-radius: 8px;
      background: #292a2d;
      cursor: pointer;
    }
    .background-option input {
      margin: 2px 0 0;
      flex-shrink: 0;
      cursor: pointer;
    }
    .background-option span {
      line-height: 1.45;
      font-size: 12px;
      color: #bdc1c6;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: auto;
      padding-top: 16px;
      flex-shrink: 0;
    }
    button {
      padding: 8px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #5f6368;
      background: #3c4043;
      color: #e8eaed;
    }
    button:hover { filter: brightness(1.08); }
    button.leave {
      background: #8ab4f8;
      border-color: #8ab4f8;
      color: #202124;
    }
  </style>
</head>
<body>
  <p class="message" id="message">
    Are you sure you want to quit Bavarium? Make sure you've saved any important data on other tabs before you go.
  </p>
  <p class="download-hint" id="downloadHint" hidden></p>
  <label class="background-option" id="backgroundOption" hidden>
    <input type="checkbox" id="downloadInBackground" />
    <span>Download in the background, Bavarium will fully end once all downloads complete</span>
  </label>
  <div class="actions">
    <button type="button" id="btnBack">Back</button>
    <button type="button" class="leave" id="btnLeave">Leave</button>
  </div>
  <script src="quit-prompt.js"></script>
</body>
</html>
