<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light dark" />
  <title>Confirm</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #202124;
      color: #e8eaed;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      min-height: 100%;
    }
    .message {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      flex: 1 1 auto;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      flex-shrink: 0;
    }
    button {
      padding: 8px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #5f6368;
      background: #3c4043;
      color: #e8eaed;
    }
    button:hover { filter: brightness(1.08); }
    button.confirm {
      background: #8ab4f8;
      border-color: #8ab4f8;
      color: #202124;
    }
  </style>
</head>
<body>
  <p class="message" id="message"></p>
  <div class="actions">
    <button type="button" id="btnBack">Back</button>
    <button type="button" class="confirm" id="btnConfirm">Continue</button>
  </div>
  <script src="confirm-prompt.js"></script>
</body>
</html>
